name: rna-motif

channels:
  - bioconda
  - conda-forge
  - defaults

dependencies:
  - meme  # Specify version if needed
  - rscape 
  - clustalo
  - python  # Modern compatible version
  - imagemagick  # For visualizing motifs
  - matplotlib  # For plotting motif logos
  - seaborn  # For enhanced plotting
  - pandas  # For data handling
  - biopython  # For sequence handling
  - scikit-learn  # For any machine learning analyses